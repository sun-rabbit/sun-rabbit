<svg width="1200" height="620" viewBox="0 0 1200 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#090B18"/>
      <stop offset="0.5" stop-color="#15102B"/>
      <stop offset="1" stop-color="#081827"/>
    </linearGradient>

    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FF4FD8"/>
      <stop offset="0.5" stop-color="#9B5CFF"/>
      <stop offset="1" stop-color="#39D9FF"/>
    </linearGradient>

    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#24102E"/>
      <stop offset="1" stop-color="#151B36"/>
    </linearGradient>

    <linearGradient id="card2" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#17152F"/>
      <stop offset="1" stop-color="#102839"/>
    </linearGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="620" rx="32" fill="url(#bg)"/>
  <circle cx="110" cy="90" r="70" fill="#FF4FD8" opacity="0.10" filter="url(#soft)"/>
  <circle cx="1080" cy="500" r="90" fill="#39D9FF" opacity="0.10" filter="url(#soft)"/>
  <circle cx="920" cy="100" r="55" fill="#9B5CFF" opacity="0.08" filter="url(#soft)"/>

  <!-- Floating particles -->
  <g fill="#FFFFFF">
    <circle cx="70" cy="185" r="2.5" opacity="0.50">
      <animate attributeName="cy" values="185;165;185" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1125" cy="160" r="2" opacity="0.45">
      <animate attributeName="cy" values="160;140;160" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1035" cy="570" r="2.5" opacity="0.35">
      <animate attributeName="cy" values="570;548;570" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="170" cy="545" r="2" opacity="0.40">
      <animate attributeName="cy" values="545;525;545" dur="5.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Header -->
  <text x="600" y="65" text-anchor="middle" fill="white"
        font-size="34" font-weight="800"
        font-family="Segoe UI, Microsoft YaHei, sans-serif"
        letter-spacing="4">✦ WHAT I BUILD ✦</text>
  <text x="600" y="96" text-anchor="middle" fill="#B8C2E8"
        font-size="15" font-family="Segoe UI, Microsoft YaHei, sans-serif"
        letter-spacing="2">AI · ROBOTICS · AUTOMATION · CREATIVE ENGINEERING</text>
  <rect x="420" y="112" width="360" height="3" rx="2" fill="url(#neon)" filter="url(#glow)">
    <animate attributeName="width" values="160;360;160" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x" values="520;420;520" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Card 1 -->
  <g>
    <rect x="40" y="145" width="540" height="190" rx="24" fill="url(#card1)" stroke="url(#neon)" stroke-width="2"/>
    <rect x="40" y="145" width="540" height="190" rx="24" fill="none" stroke="#FF4FD8" stroke-width="1.5"
          stroke-dasharray="12 10" opacity="0.55">
      <animate attributeName="stroke-dashoffset" values="0;-44" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="58" y="169" width="5" height="52" rx="2.5" fill="#FF4FD8" filter="url(#glow)"/>
    <circle cx="105" cy="194" r="28" fill="#FF4FD8" opacity="0.15"/>
    <text x="105" y="202" text-anchor="middle" fill="#FF7BE3"
          font-size="20" font-weight="800" font-family="Segoe UI, sans-serif">AI</text>
    <text x="150" y="190" fill="#FFFFFF" font-size="24" font-weight="800"
          font-family="Segoe UI, Microsoft YaHei, sans-serif">AI VISION</text>
    <text x="150" y="216" fill="#FF88E4" font-size="13" font-weight="700"
          font-family="Segoe UI, Microsoft YaHei, sans-serif" letter-spacing="1.4">SEE · DETECT · UNDERSTAND</text>
    <text x="78" y="258" fill="#E8ECFF" font-size="16"
          font-family="Segoe UI, Microsoft YaHei, sans-serif">
      <tspan x="78" dy="0">目标检测与图像识别　·　YOLO 模型训练与部署</tspan>
      <tspan x="78" dy="30">OpenCV 图像处理　·　工业缺陷检测</tspan>
    </text>
  </g>

  <!-- Card 2 -->
  <g>
    <rect x="620" y="145" width="540" height="190" rx="24" fill="url(#card2)" stroke="url(#neon)" stroke-width="2"/>
    <rect x="620" y="145" width="540" height="190" rx="24" fill="none" stroke="#9B5CFF" stroke-width="1.5"
          stroke-dasharray="12 10" opacity="0.55">
      <animate attributeName="stroke-dashoffset" values="0;44" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="638" y="169" width="5" height="52" rx="2.5" fill="#9B5CFF" filter="url(#glow)"/>
    <circle cx="685" cy="194" r="28" fill="#9B5CFF" opacity="0.15"/>
    <text x="685" y="202" text-anchor="middle" fill="#C6A4FF"
          font-size="18" font-weight="800" font-family="Segoe UI, sans-serif">RB</text>
    <text x="730" y="190" fill="#FFFFFF" font-size="24" font-weight="800"
          font-family="Segoe UI, Microsoft YaHei, sans-serif">ROBOTICS</text>
    <text x="730" y="216" fill="#CDB8FF" font-size="13" font-weight="700"
          font-family="Segoe UI, Microsoft YaHei, sans-serif" letter-spacing="1.4">MOVE · PLAN · COLLABORATE</text>
    <text x="658" y="258" fill="#E8ECFF" font-size="16"
          font-family="Segoe UI, Microsoft YaHei, sans-serif">
      <tspan x="658" dy="0">机械臂流程控制　·　机器人视觉引导　·　ROS 开发</tspan>
      <tspan x="658" dy="30">智能抓取与路径规划　·　数字化产线控制</tspan>
    </text>
  </g>

  <!-- Card 3 -->
  <g>
    <rect x="40" y="365" width="540" height="190" rx="24" fill="url(#card2)" stroke="url(#neon)" stroke-width="2"/>
    <rect x="40" y="365" width="540" height="190" rx="24" fill="none" stroke="#39D9FF" stroke-width="1.5"
          stroke-dasharray="12 10" opacity="0.55">
      <animate attributeName="stroke-dashoffset" values="0;44" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="58" y="389" width="5" height="52" rx="2.5" fill="#39D9FF" filter="url(#glow)"/>
    <circle cx="105" cy="414" r="28" fill="#39D9FF" opacity="0.15"/>
    <text x="105" y="422" text-anchor="middle" fill="#79E8FF"
          font-size="18" font-weight="800" font-family="Segoe UI, sans-serif">AU</text>
    <text x="150" y="410" fill="#FFFFFF" font-size="24" font-weight="800"
          font-family="Segoe UI, Microsoft YaHei, sans-serif">AUTOMATION</text>
    <text x="150" y="436" fill="#7BE8FF" font-size="13" font-weight="700"
          font-family="Segoe UI, Microsoft YaHei, sans-serif" letter-spacing="1.4">CONNECT · CONTROL · OPTIMIZE</text>
    <text x="78" y="478" fill="#E8ECFF" font-size="16"
          font-family="Segoe UI, Microsoft YaHei, sans-serif">
      <tspan x="78" dy="0">PLC 数据交互　·　MQTT 设备通信　·　工业协议对接</tspan>
      <tspan x="78" dy="30">设备状态监控</tspan>
    </text>
  </g>

  <!-- Card 4 -->
  <g>
    <rect x="620" y="365" width="540" height="190" rx="24" fill="url(#card1)" stroke="url(#neon)" stroke-width="2"/>
    <rect x="620" y="365" width="540" height="190" rx="24" fill="none" stroke="#FF4FD8" stroke-width="1.5"
          stroke-dasharray="12 10" opacity="0.55">
      <animate attributeName="stroke-dashoffset" values="0;-44" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="638" y="389" width="5" height="52" rx="2.5" fill="#FF4FD8" filter="url(#glow)"/>
    <circle cx="685" cy="414" r="28" fill="#FF4FD8" opacity="0.15"/>
    <text x="685" y="422" text-anchor="middle" fill="#FF7BE3"
          font-size="18" font-weight="800" font-family="Segoe UI, sans-serif">APP</text>
    <text x="730" y="410" fill="#FFFFFF" font-size="24" font-weight="800"
          font-family="Segoe UI, Microsoft YaHei, sans-serif">AI APPLICATIONS</text>
    <text x="730" y="436" fill="#FF88E4" font-size="13" font-weight="700"
          font-family="Segoe UI, Microsoft YaHei, sans-serif" letter-spacing="1.4">THINK · TALK · ACT</text>
    <text x="658" y="478" fill="#E8ECFF" font-size="16"
          font-family="Segoe UI, Microsoft YaHei, sans-serif">
      <tspan x="658" dy="0">智能语音交互　·　本地大模型应用　·　AI Agent</tspan>
      <tspan x="658" dy="30">预测性维护　·　多模态智能应用</tspan>
    </text>
  </g>

  <!-- Footer -->
  <text x="600" y="592" text-anchor="middle" fill="#9FA8D3"
        font-size="13" font-family="Segoe UI, Microsoft YaHei, sans-serif"
        letter-spacing="2">BUILDING INTELLIGENT SYSTEMS WITH CODE, VISION AND CREATIVITY</text>
</svg>